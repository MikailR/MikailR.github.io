<html lang="en">
<head>
    <title>Bauer Benefits</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/flex-classes.css">
    <link rel="stylesheet" href="./css/nav-style.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- Navigation -->
    <input class="burger-input" type="checkbox" id="burger-input" role="button" title="menu">
    <label class="burger-label" for="burger-input" aria-hidden="true" title="menu">
        <span class="bar-1"></span>
        <span class="bar-2"></span>
        <span class="bar-3"></span>
    </label>
    <nav>
        <a href="./index.html">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Clients</a>
        <a href="#">Newsletter</a>
        <a href="#">Contact</a>
        <img class="nav-logo" src="./assets/navigation/logo.png" alt="Bauer Benefits Logo">
    </nav>

    <!-- Main Content -->
    <div class="jumbotron flex-col-center">
        <img class="jumbotron-logo" src="./assets/jumbotron/logo.png" alt="Bauer Benefits Logo">
        <div class="jumbotron-delimiter"></div>
        <h2 class="jumbotron-main-text">A Trusted Partner</h2>
        <div class="jumbotron-contact-buttons flex-col-center">
            <div class="phone-container flex-row-center">
                <a class="phone-number flex-row-center" href="tel:519-240-1290">
                    <img class="phone-icon" alt="phone icon" src="./assets/jumbotron/contact/phone.svg">
                </a>
            </div>
            <div class="email-container flex-row-center">
                <a class="email-address flex-row-center" href="mailto:ross@bauerbenefits.com">
                    <img class="email-icon" src="./assets/jumbotron/contact/envelope.svg" alt="email icon">
                </a>
            </div>
        </div>
        <div class="arrow-container">
            <div class="arrow arrow-first"></div>
            <div class="arrow arrow-second"></div>
        </div>
    </div>

    <section class="section-1 flex-col-center">Section 1</section>
    <section class="section-2 flex-col-center">Section 2</section>
    <section class="section-3 flex-col-center">Section 3</section>

    <!-- JavaScript -->
    <script src="./js/index.js"></script>
</body>
</html>
